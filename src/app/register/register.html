<div class="register-page-wrapper d-flex align-items-center justify-content-center">
  <div class="register-overlay"></div>
  
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="register-card p-4 p-md-5 shadow-lg rounded-4 bg-white position-relative">
          <div class="text-center mb-4">
            <div class="logo-placeholder mb-3 mx-auto d-flex align-items-center justify-content-center">
              <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
            </div>
            <h2 class="fw-bold">Crear Cuenta</h2>
            <p class="text-muted">Únete a nuestra comunidad de viajeros</p>
          </div>

          <form>
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre Completo</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control bg-light border-start-0 ps-0" placeholder="Tu nombre" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" class="form-control bg-light border-start-0 ps-0" placeholder="tu@email.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control bg-light border-start-0 ps-0" placeholder="••••••••" required>
              </div>
            </div>

            <div class="mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                  Acepto los <a href="#" class="text-primary text-decoration-none fw-semibold">términos y condiciones</a>
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3 shadow-sm py-3 fw-bold mb-4">
              Registrarse ahora
            </button>

            <div class="social-login-divider d-flex align-items-center mb-4">
              <hr class="flex-grow-1">
              <span class="px-3 text-muted small text-uppercase">O regístrate con</span>
              <hr class="flex-grow-1">
            </div>

            <div class="row g-2 mb-4">
              <div class="col-6">
                <button type="button" class="btn btn-outline-light border text-dark w-100 py-2 d-flex align-items-center justify-content-center">
                  <i class="bi bi-google me-2"></i> Google
                </button>
              </div>
              <div class="col-6">
                <button type="button" class="btn btn-outline-light border text-dark w-100 py-2 d-flex align-items-center justify-content-center">
                  <i class="bi bi-facebook me-2"></i> Facebook
                </button>
              </div>
            </div>

            <div class="text-center">
              <p class="text-muted small mb-0">
                ¿Ya tienes una cuenta? 
                <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Inicia sesión</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
