<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 bg-white p-4 shadow rounded">
      <h2 class="text-center mb-4">Contacta con Nosotros</h2>
      <form>
        <div class="mb-3">
          <label class="form-label">Nombre Completo</label>
          <input type="text" class="form-control" placeholder="Escribe tu nombre">
        </div>
        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" placeholder="nombre@ejemplo.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Enviar Consulta</button>
      </form>
    </div>
  </div>
</div>
