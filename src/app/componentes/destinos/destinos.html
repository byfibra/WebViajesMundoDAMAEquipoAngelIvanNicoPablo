<div class="container mt-5">
  <h2 class="text-center mb-4">Nuestros Destinos</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let destination of destinations">
      <div class="card h-100 shadow-sm">
        <img [src]="destination.image" class="card-img-top" [alt]="destination.name">
        <div class="card-body text-center">
          <h5 class="card-title">{{ destination.name }}</h5>
          <p class="card-text">{{ destination.description }}</p>
          <p class="card-text"><strong>Precio: ${{ destination.price }}</strong></p>
          <a [routerLink]="['/destination', destination.id]" class="btn btn-primary">Ver Detalles</a>
        </div>
      </div>
    </div>
  </div>
</div>
