<section class="destinos-hero py-5">
  <div class="container text-center">
    <h1 class="destinos-title">Nuestros Destinos</h1>
    <p class="destinos-subtitle">Explora el mundo con nuestros paquetes cuidadosamente seleccionados</p>
    <div class="category-buttons mt-4">
      <button
        *ngFor="let category of categories"
        type="button"
        class="btn btn-category"
        [class.active]="selectedCategory === category"
        (click)="selectCategory(category)">
        {{ category }}
      </button>
    </div>
  </div>
</section>

<section class="destinations-section">
  <div class="destinations-container">
    <div class="destinations-grid">
      <div class="destination-card" *ngFor="let destination of filteredDestinations">
        <div class="card-image-container">
          <img [src]="destination.image" [alt]="destination.name" class="card-image">
        </div>
        <div class="card-content">
          <span class="card-badge">{{ destination.category }}</span>
          <h2 class="card-title">{{ destination.name }}</h2>
          <p class="card-description">{{ destination.description }}</p>

          <div class="card-features">
            <div class="feature-item" *ngFor="let feature of destination.features">
              <span class="feature-icon" aria-hidden="true">&#10003;</span>
              <span class="feature-text">{{ feature }}</span>
            </div>
          </div>

          <div class="card-footer">
            <div class="price-section">
              <span class="price-label">Desde</span>
              <span class="price-amount">${{ destination.price | number:'1.0-0' }}</span>
            </div>
            <a [routerLink]="['/destination', destination.id]" class="btn-reservar">Reservar</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
